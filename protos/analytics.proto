syntax = "proto3";

package drs.analytics;

service AnalyticsService {
  rpc Predict (PredictRequest) returns (PredictResponse) {}
  rpc PredictCluster (PredictClusterRequest) returns (PredictClusterResponse) {}
  rpc BuildFeatures (BuildFeaturesRequest) returns (BuildFeaturesResponse) {}
}

message PredictRequest {
  string host_id = 1;
  string metric = 2;
  int32 horizon_minutes = 3;
}

message PredictResponse {
  repeated double values = 1;
  string model = 2;
}

message PredictClusterRequest {
  int32 horizon_minutes = 1;
  int32 history_lookback_minutes = 2;
}

message PredictedHostMetricRow {
  string timestamp = 1;
  string host = 2;
  double cpu = 3;
  double ram = 4;
  double swap = 5;
}

message PredictClusterResponse {
  repeated PredictedHostMetricRow rows = 1;
  string model = 2;
}

message BuildFeaturesRequest {
  string host_id = 1;
}

message BuildFeaturesResponse {
  string status = 1;
}

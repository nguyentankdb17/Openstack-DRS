syntax = "proto3";

package drs.collector;

service CollectorService {
  rpc CollectMetrics (CollectMetricsRequest) returns (CollectMetricsResponse) {}
  rpc CollectEvents (CollectEventsRequest) returns (CollectEventsResponse) {}
}

message CollectMetricsRequest {}

message CollectMetricsResponse {
  string status = 1;
  string message = 2;
}

message CollectEventsRequest {}

message CollectEventsResponse {
  string status = 1;
  bool has_events = 2;
  int32 event_count = 3;
  repeated string events = 4;
}
